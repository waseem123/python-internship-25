<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #d1{
            background-color: blueviolet;
            color: white;
            margin: 16px;
            padding: 16px;
            border-radius: 120px;
        }

        #d2{
            width: 200px;
            height: 100px;
            background-color: brown;
            border-radius: 50%;
        }

        #d3{
            width: 100px;
            height: 300px;
            margin: 16px;
            padding: 16px;
            background-color: crimson;
            border-top-right-radius: 24px;
            border-bottom-left-radius: 64px;
            border-bottom-right-radius: 64px;
        }

        #d4{
            background-color: darkmagenta;
            width: 200px;
            height: 200px;
            border-radius: 50%;
        }

        img{
            border: 5px solid rgb(25, 206, 88);
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div id="d1">
        Welcome
    </div>

    <div id="d2"></div>

    <div id="d3"></div>

    <div id="d4"></div>
    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRSDdc7ZHr1gAvUADsK2GDUuyffGCX61n8zJA&s" alt="">
</body>

</html>
