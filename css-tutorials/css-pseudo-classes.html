<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a:link{
            color: green;
            background-color: black;
            font-family: Arial, Helvetica, sans-serif;
            padding: 8px;
            text-decoration: none;
        }

        a:visited{
            color: magenta;
        }

        a:active{
            color: brown;
            background-color: darkblue;
        }

        a:hover{
            background-color: darkred;
        }

        img{
            width: 150px;
        }

        img:hover{
            width: 300px;
        }
    </style>
</head>

<body>

    <p>Pseudo Classes Syntax</p>
    <pre>
        selector:pseudo_class_name{
            property1 : value;
            property2 : value;
            property3 : value;
            ...
            propertyN : value;
        }
    </pre>
    <ol>
        <li>New</li>
        <li>Active</li>
        <li>Visited</li>
        <li>Hover</li>
    </ol>
