<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,
        css {
            box-sizing: border-box;
            margin: 8px;
            font-family: Arial, Helvetica, sans-serif;
        }

        h1{
            font-size: 84px;
            color: white;
            text-shadow: -8px -8px 8px rgb(146, 131, 131), 8px 8px 8px rgb(146, 131, 131);
        }

        #myimage1{
            width: 200px;
            height: 200px;
            box-shadow: 8px 8px 8px rgba(146, 131, 131, 0.587);
        }

        #myimage2{
            margin: 16px;
            display: block;
            filter: drop-shadow(80px 8px rgba(0, 0, 0, 0.599));
        }
    </style>
</head>

<body>
    <h1>Text Shadows</h1>
    <img id="myimage1" src="https://laptoptestguide.com/wp-content/uploads/computer-04.jpg" alt="">
    <img id="myimage2" src="shizuka.png" alt="">
</body>

</html>
